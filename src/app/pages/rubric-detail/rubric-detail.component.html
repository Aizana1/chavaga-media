<section class="rubric-detail">

  <div class="rubric-detail__bg-viewport">
    <div class="rubric-detail__bg-deco-wrap">
      <img src="assets/images/rubrics-bg1.svg" alt="" class="rubric-detail__bg-deco rubric-detail__bg-deco--left" aria-hidden="true">
      <img src="assets/images/rubrics-bg1.svg" alt="" class="rubric-detail__bg-deco rubric-detail__bg-deco--right" aria-hidden="true">
    </div>
    <img src="assets/images/yurt.svg" alt="" class="rubric-detail__bg-yurt" aria-hidden="true">
    <img src="assets/images/rubrics-bg1.svg" alt="" class="rubric-detail__bg-deco-bottom" aria-hidden="true">
  </div>

  <div class="rubric-detail__inner">

    <div class="rubric-detail__header">
      <h1 class="rubric-detail__rubric-title">{{ rubricTitle() }}</h1>
    </div>

    <div class="rubric-detail__grid">

      <ng-container *ngFor="let article of currentPageArticles(); let i = index">
        <button
          class="rubric-detail__card"
          [class.rubric-detail__card--active]="selectedArticle()?.id === article.id"
          (click)="toggleArticle(article)"
        >

          <div class="rubric-detail__card-title">
            {{ article.title[currentLang()] }}
          </div>
        </button>
      </ng-container>

      <ng-container *ngFor="let _ of [].constructor(ITEMS_PER_PAGE - currentPageArticles().length)">
        <div class="rubric-detail__card rubric-detail__card--empty">
          <div class="rubric-detail__card-img-wrap rubric-detail__card-img-placeholder"></div>
          <div class="rubric-detail__card-title rubric-detail__card-title--placeholder"></div>
        </div>
      </ng-container>

    </div>

    <div class="rubric-detail__pagination" *ngIf="totalPages() > 1">
      <button
        class="rubric-detail__arrow"
        [class.rubric-detail__arrow--disabled]="!hasPrev()"
        (click)="prevPage()"
        aria-label="Назад"
      >
        ←
      </button>
      <span class="rubric-detail__page-info">{{ currentPage() + 1 }} / {{ totalPages() }}</span>
      <button
        class="rubric-detail__arrow"
        [class.rubric-detail__arrow--disabled]="!hasNext()"
        (click)="nextPage()"
        aria-label="Вперёд"
      >
        →
      </button>
    </div>

    <!-- Развёрнутая статья -->
    <article class="rubric-detail__article" *ngIf="selectedArticle()" #articleRef>
      <h2 class="rubric-detail__article-title">
        {{ selectedArticle()!.title[currentLang()] }}
      </h2>
      <p class="rubric-detail__article-date" *ngIf="selectedArticle()!.date">
        {{ selectedArticle()!.date![currentLang()] }}
      </p>
      <div class="rubric-detail__article-body" [innerHTML]="safeBody()"></div>
    </article>

  </div>
</section>
