<section class="stickers">
  <div class="stickers__inner">
    <h1 class="stickers__title">{{ content[currentLang()].title }}</h1>

    <div class="stickers__layout">

      <div class="stickers__pink-bg" aria-hidden="true"></div>

      <a href="https://t.me/addstickers/Chavagamedia" class="stickers__btn">
        {{ content[currentLang()].telegramBtn }}
      </a>

      <div class="stickers__shop">
        <div class="stickers__brochure-wrap">
          <p class="stickers__shop-text" [innerHTML]="safeShopText()"></p>
          <img
            src="https://media.chavaga-media.com/merch/Trifold-Perspective-Brochure-Mockup%201.svg"
            alt=""
            class="stickers__brochure stickers__brochure--desktop"
            aria-hidden="true"
          >
          <img
            src="https://media.chavaga-media.com/merch/Trifold-Perspective-Brochure-Mockup%201%20(1).svg"
            alt=""
            class="stickers__brochure stickers__brochure--mobile"
            aria-hidden="true"
          >
        </div>
      </div>

      <div class="stickers-right">
        <img
        src="https://media.chavaga-media.com/merch/%D0%98%D0%BB%D0%BB%D1%8E%D1%81%D1%82%D1%80%D0%B0%D1%86%D0%B8%D1%8F_%D0%B1%D0%B5%D0%B7_%D0%BD%D0%B0%D0%B7%D0%B2%D0%B0%D0%BD%D0%B8%D1%8F%2031%202%202.svg"
        alt="Стикеры"
        class="stickers__collage"
      >
      <img
        src="https://media.chavaga-media.com/merch/iPhone-17-Pro-Cover-Mockup%201.svg"
        alt=""
        class="stickers__phone"
        aria-hidden="true"
      >
      </div>
     
    </div>
  </div>
</section>
