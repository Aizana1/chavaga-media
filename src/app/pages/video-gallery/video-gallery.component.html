<section class="video-gallery">
  <div class="video-gallery__inner">

    <h1 class="video-gallery__title">{{ title[currentLang()] }}</h1>

    <div class="video-gallery__grid" *ngIf="videos.length > 0; else empty">
      <button
        *ngFor="let video of videos"
        class="video-card"
        (click)="openModal(video)"
        [attr.aria-label]="video.title[currentLang()]"
      >
        <div class="video-card__thumb-wrap">
          <img
            [src]="video.thumbnail"
            [alt]="video.title[currentLang()]"
            class="video-card__thumb"
          >
          <div class="video-card__play" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="24" fill="rgba(76,2,99,0.75)"/>
              <polygon points="19,14 37,24 19,34" fill="#fff"/>
            </svg>
          </div>
        </div>
        <p class="video-card__title">{{ video.title[currentLang()] }}</p>
      </button>
    </div>

    <ng-template #empty>
      <p class="video-gallery__empty">Видео скоро появятся</p>
    </ng-template>

  </div>
</section>

<div
  class="video-modal"
  *ngIf="activeVideo()"
  (click)="onOverlayClick($event)"
  role="dialog"
  aria-modal="true"
>
  <div class="video-modal__box">

    <button class="video-modal__close" (click)="closeModal()" aria-label="Закрыть">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="4" y1="4" x2="20" y2="20" stroke="#4C0263" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="4" x2="4" y2="20" stroke="#4C0263" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>

    <p class="video-modal__title">{{ activeVideo()!.title[currentLang()] }}</p>

    <div class="video-modal__player">
      <iframe
        *ngIf="activeVideo()!.type === 'stream'"
        [src]="safeUrl()"
        class="video-modal__iframe"
        allow="accelerometer; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
      ></iframe>

      <video
        *ngIf="activeVideo()!.type === 'direct'"
        [src]="activeVideo()!.streamUrl"
        class="video-modal__video"
        controls
        autoplay
        playsinline
      ></video>
    </div>

  </div>
</div>
