<header class="header">
  <div class="header__inner">
    <!-- Logo + lang switcher (mobile stacked) -->
    <div class="header__left">
      <a href="/" class="logo">
        <img src="assets/images/logo.svg" alt="Chavaga Media" class="logo__img">
      </a>
      <div class="lang-switcher lang-switcher--mobile-header">
        <button class="lang-btn" [class.lang-btn--active]="lang.language() === 'tuv'" (click)="setLang('tuv')">ТУВ</button>
        <button class="lang-btn" [class.lang-btn--active]="lang.language() === 'rus'" (click)="setLang('rus')">РУС</button>
      </div>
    </div>

    <!-- Desktop nav -->
    <nav class="nav desktop-nav" [class.desktop-nav--tuv]="lang.language() === 'tuv'">
      <ng-container *ngFor="let item of navItems()">
        <a [routerLink]="item.route" routerLinkActive="nav__link--active" class="nav__link">{{ item.label }}</a>
      </ng-container>
    </nav>

    <!-- Language switcher (desktop) -->
    <div class="lang-switcher lang-switcher--desktop">
      <button class="lang-btn" [class.lang-btn--active]="lang.language() === 'tuv'" (click)="setLang('tuv')">ТУВ</button>
      <button class="lang-btn" [class.lang-btn--active]="lang.language() === 'rus'" (click)="setLang('rus')">РУС</button>
    </div>

    <!-- Hamburger (mobile) -->
    <button class="hamburger" (click)="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Mobile drawer overlay -->
<div class="mobile-overlay" [class.mobile-overlay--open]="menuOpen" (click)="menuOpen = false"></div>
<nav class="mobile-drawer" [class.mobile-drawer--open]="menuOpen" [class.mobile-drawer--tuv]="lang.language() === 'tuv'">
  <ng-container *ngFor="let item of navItems()">
    <a [routerLink]="item.route" routerLinkActive="mobile-drawer__link--active" class="mobile-drawer__link" (click)="menuOpen = false; true">{{ item.label }}</a>
  </ng-container>
</nav>
